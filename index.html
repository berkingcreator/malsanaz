<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troll AI - Destek</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat-container { width: 400px; height: 500px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        header { background: #0084ff; color: white; padding: 15px; display: flex; align-items: center; gap: 10px; cursor: default; }
        header img { width: 30px; height: 30px; cursor: pointer; border-radius: 50%; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .user { align-self: flex-end; background: #0084ff; color: white; }
        .ai { align-self: flex-start; background: #e4e6eb; color: black; }
        .input-area { padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 5px; }
        input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #0084ff; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }

        /* Admin Paneli */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; padding: 20px; z-index: 100; box-sizing: border-box;}
        #user-list { width: 200px; border-right: 1px solid #444; overflow-y: auto; }
        .user-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; }
        .user-item:hover { background: #333; }
        #admin-chat { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        
        /* Giriş Ekranı */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0084ff; display: flex; justify-content: center; align-items: center; z-index: 200; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="background: white; padding: 30px; border-radius: 10px; text-align: center;">
            <h3>Hoş Geldiniz</h3>
            <input type="text" id="user-name" placeholder="İsminiz nedir?">
            <button onclick="startChat()">Giriş Yap</button>
        </div>
    </div>

    <div id="chat-container">
        <header>
            <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" onclick="toggleAdmin()" alt="AI Logo">
            <span>Troll AI Asistanı</span>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Mesajınızı yazın...">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display: flex; height: 90%;">
            <div id="user-list">
                <h4>Aktif Kullanıcılar</h4>
                <div id="users"></div>
            </div>
            <div id="admin-chat">
                <h4 id="target-name">Kullanıcı Seçin</h4>
                <div id="admin-messages" style="flex:1; overflow-y:auto; margin-bottom: 10px;"></div>
                <div class="input-area">
                    <input type="text" id="admin-input" placeholder="Cevap yaz...">
                    <button onclick="sendAdminReply()">AI Olarak Yanıtla</button>
                    <button onclick="toggleAdmin()" style="background:red">Kapat</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Yapılandırması
        const firebaseConfig = {
            apiKey: "AIzaSyDpNKkeCmkJB4-w1zyD9PZ8WDrCFfzUrjc",
            authDomain: "mesajger-7d7af.firebaseapp.com",
            projectId: "mesajger-7d7af",
            storageBucket: "mesajger-7d7af.firebasestorage.app",
            messagingSenderId: "433074782256",
            appId: "1:433074782256:web:c7251b88c00f86d182edf5",
            databaseURL: "https://mesajger-7d7af-default-rtdb.firebaseio.com" // Veritabanı URL'sini kontrol et
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = "";
        let selectedUser = "";

        // Giriş yapma
        function startChat() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("İsim yazmalısın!");
            currentUser = name;
            document.getElementById('login-overlay').style.display = 'none';
            listenMessages(currentUser, 'messages');
        }

        // Mesaj Gönder (Kullanıcı)
        function sendMessage() {
            const text = document.getElementById('user-input').value;
            if(!text) return;
            db.ref('chats/' + currentUser).push({
                sender: currentUser,
                text: text,
                timestamp: Date.now()
            });
            document.getElementById('user-input').value = '';
        }

        // Mesaj Gönder (Admin)
        function sendAdminReply() {
            const text = document.getElementById('admin-input').value;
            if(!text || !selectedUser) return;
            db.ref('chats/' + selectedUser).push({
                sender: "AI",
                text: text,
                timestamp: Date.now()
            });
            document.getElementById('admin-input').value = '';
        }

        // Mesajları Dinle
        function listenMessages(user, containerId) {
            db.ref('chats/' + user).on('value', (snapshot) => {
                const container = document.getElementById(containerId);
                container.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    const div = document.createElement('div');
                    div.className = `msg ${data.sender === 'AI' ? 'ai' : 'user'}`;
                    div.innerText = data.text;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        // Admin Panelini Aç/Kapat
        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
            if(panel.style.display === 'flex') loadUserList();
        }

        // Kullanıcı Listesini Yükle
        function loadUserList() {
            db.ref('chats').on('value', (snapshot) => {
                const list = document.getElementById('users');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const div = document.createElement('div');
                    div.className = "user-item";
                    div.innerText = child.key;
                    div.onclick = () => {
                        selectedUser = child.key;
                        document.getElementById('target-name').innerText = "Hedef: " + selectedUser;
                        listenMessages(selectedUser, 'admin-messages');
                    };
                    list.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
