<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        
        /* Navbar */
        .navbar { background: #ffffff; padding: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; }
        #logo { width: 35px; height: 35px; background: #007bff; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        #logo:active { transform: scale(0.9); }
        .navbar h2 { margin-left: 12px; font-size: 18px; color: #333; }

        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user-msg { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .bot-msg { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        /* Input Area */
        .input-box { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        /* --- ADMIN PANEL (GİZLİ) --- */
        #admin-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 999; flex-direction: column;
        }
        .admin-header { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .admin-content { flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa; }
        .message-card { background: white; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
        .message-card p { margin-bottom: 8px; font-size: 14px; }
        .reply-input { width: 70%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        .reply-btn { background: #28a745; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="navbar">
    <div id="logo" onclick="openAdmin()"></div>
    <h2>SmartAI Assistant</h2>
</div>

<div id="chat-container">
    <div class="bubble bot-msg">Merhaba! Ben SmartAI. Size nasıl yardımcı olabilirim?</div>
</div>

<div class="input-box">
    <input type="text" id="userInp" placeholder="Mesajınızı yazın...">
    <button onclick="sendToFirebase()">Gönder</button>
</div>

<div id="admin-overlay">
    <div class="admin-header">
        <h3>Admin Kontrol Paneli</h3>
        <button onclick="document.getElementById('admin-overlay').style.display='none'" style="background:red;">Kapat</button>
    </div>
    <div class="admin-content" id="admin-list">
        <p style="text-align:center; color:#999;">Henüz mesaj yok...</p>
    </div>
</div>

<script>
    // Firebase Yapılandırması
    const firebaseConfig = {
        apiKey: "AIzaSyDpNKkeCmkJB4-w1zyD9PZ8WDrCFfzUrjc",
        authDomain: "mesajger-7d7af.firebaseapp.com",
        projectId: "mesajger-7d7af",
        storageBucket: "mesajger-7d7af.firebasestorage.app",
        messagingSenderId: "433074782256",
        appId: "1:433074782256:web:c7251b88c00f86d182edf5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Kullanıcı Mesaj Gönderme
    function sendToFirebase() {
        const msg = document.getElementById('userInp').value;
        if (!msg) return;

        // Ekranda göster
        renderMsg(msg, 'user-msg');
        document.getElementById('userInp').value = '';

        // Firebase'e yaz
        db.ref('chats').push({
            text: msg,
            reply: "",
            timestamp: Date.now()
        });
    }

    function renderMsg(text, type) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        document.getElementById('chat-container').appendChild(div);
        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
    }

    // 2. Admin Panelini Açma
    function openAdmin() {
        const pass = prompt("Erişim Şifresi:");
        if (pass === "berk1453") {
            document.getElementById('admin-overlay').style.display = 'flex';
            listenMessages();
        } else {
            alert("Yetkisiz Giriş!");
        }
    }

    // 3. Admin: Mesajları Dinle ve Listele
    function listenMessages() {
        db.ref('chats').on('value', (snapshot) => {
            const list = document.getElementById('admin-list');
            list.innerHTML = ''; 
            
            snapshot.forEach((child) => {
                const data = child.val();
                const card = document.createElement('div');
                card.className = 'message-card';
                card.innerHTML = `
                    <p><strong>Gelen:</strong> ${data.text}</p>
                    <input type="text" id="inp-${child.key}" class="reply-input" placeholder="Cevap yaz...">
                    <button class="reply-btn" onclick="sendReply('${child.key}')">Cevapla</button>
                `;
                list.appendChild(card);
            });
        });
    }

    // 4. Admin: Cevap Gönder
    function sendReply(id) {
        const replyVal = document.getElementById(`inp-${id}`).value;
        if (!replyVal) return;

        db.ref('chats/' + id).update({
            reply: replyVal
        });
    }

    // 5. Kullanıcı: Bot Cevabını Bekle
    db.ref('chats').on('child_changed', (snapshot) => {
        const data = snapshot.val();
        if (data.reply !== "") {
            renderMsg(data.reply, 'bot-msg');
            // Cevap alındıktan sonra reply alanını temizle (tekrar yazmasın diye)
            db.ref('chats/' + snapshot.key).update({ reply: "" });
        }
    });
</script>

</body>
</html>
