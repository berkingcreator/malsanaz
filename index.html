<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #f5f5f7; --accent: #007aff; --white: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header & Logo */
        header { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; }
        #logo { width: 40px; height: 40px; cursor: pointer; border-radius: 10px; }
        header h1 { margin-left: 10px; font-size: 18px; color: #1d1d1f; flex-grow: 1; }

        /* Chat Area */
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #e9e9eb; color: #1d1d1f; border-bottom-left-radius: 4px; }

        /* Input Area */
        .input-area { padding: 15px; background: var(--white); display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex-grow: 1; border: 1px solid #ccc; padding: 12px; border-radius: 20px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; }

        /* Admin Panel Overlay */
        #admin-panel { display: none; position: fixed; inset: 0; background: white; z-index: 100; padding: 20px; overflow-y: auto; }
        .admin-item { border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-radius: 10px; background: #fafafa; }
        .close-btn { float: right; color: red; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" id="logo" onclick="checkAdmin()">
    <h1>GenAI Chat v2.0</h1>
</header>

<div id="chat-box">
    <div class="msg bot">Merhaba! Ben yeni nesil yapay zeka asistanın. Sana nasıl yardımcı olabilirim?</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Bir şeyler yazın...">
    <button onclick="sendMessage()">Gönder</button>
</div>

<div id="admin-panel">
    <span class="close-btn" onclick="document.getElementById('admin-panel').style.display='none'">Kapat [X]</span>
    <h2>Gelen Mesajlar (Admin)</h2>
    <div id="admin-list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDpNKkeCmkJB4-w1zyD9PZ8WDrCFfzUrjc",
        authDomain: "mesajger-7d7af.firebaseapp.com",
        projectId: "mesajger-7d7af",
        storageBucket: "mesajger-7d7af.firebasestorage.app",
        messagingSenderId: "433074782256",
        appId: "1:433074782256:web:c7251b88c00f86d182edf5"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Kullanıcı mesaj gönderdiğinde
    function sendMessage() {
        const text = document.getElementById('user-input').value;
        if(!text) return;

        // Ekrana ekle
        addMessage(text, 'user');
        document.getElementById('user-input').value = '';

        // Firebase'e kaydet (Senin görmen için)
        db.ref('trol_messages').push({
            text: text,
            time: Date.now(),
            reply: ""
        });
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        document.getElementById('chat-box').appendChild(div);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    // Admin Giriş Kontrolü
    function checkAdmin() {
        const pass = prompt("Şifre giriniz:");
        if(pass === "berk1453") {
            document.getElementById('admin-panel').style.display = 'block';
            loadAdminData();
        }
    }

    // Admin Mesajları Yükle
    function loadAdminData() {
        db.ref('trol_messages').on('value', (snapshot) => {
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            snapshot.forEach((child) => {
                const data = child.val();
                const div = document.createElement('div');
                div.className = 'admin-item';
                div.innerHTML = `
                    <p><strong>Kullanıcı:</strong> ${data.text}</p>
                    <input type="text" id="reply-${child.key}" placeholder="Cevabın...">
                    <button onclick="sendReply('${child.key}')">Cevapla</button>
                `;
                list.appendChild(div);
            });
        });
    }

    // Admin Cevap Gönderdiğinde
    function sendReply(id) {
        const replyText = document.getElementById(`reply-${id}`).value;
        db.ref('trol_messages/' + id).update({ reply: replyText });
    }

    // Bot Cevaplarını Dinle (Kullanıcı Ekranı İçin)
    db.ref('trol_messages').on('child_changed', (snapshot) => {
        const data = snapshot.val();
        if(data.reply) {
            addMessage(data.reply, 'bot');
            // Cevap geldikten sonra Firebase'den temizleyebiliriz ki tekrar etmesin
            db.ref('trol_messages/' + snapshot.key + '/reply').set("");
        }
    });
</script>

</body>
</html>
