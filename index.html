<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sezan AI - Mesajger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Senin Paylaştığın Firebase Bilgileri
        const firebaseConfig = {
            apiKey: "AIzaSyDpNKkeCmkJB4-w1zyD9PZ8WDrCFfzUrjc",
            authDomain: "mesajger-7d7af.firebaseapp.com",
            projectId: "mesajger-7d7af",
            storageBucket: "mesajger-7d7af.firebasestorage.app",
            messagingSenderId: "433074782256",
            appId: "1:433074782256:web:c7251b88c00f86d182edf5",
            measurementId: "G-BC5LS6C50S"
        };

        // Gemini AI için Geçici Key (Eğer varsa buraya yazabilirsin)
        const geminiApiKey = ""; 

        // Firebase Başlatma
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let isAdmin = false;
        let isBotActive = true;
        let userName = localStorage.getItem('sezan_user_name') || "";

        // UI Elemanları
        const chatWindow = document.getElementById('chatWindow');
        const loginOverlay = document.getElementById('loginOverlay');
        const adminPanel = document.getElementById('adminPanel');

        // Uygulama Başlatıcı
        const initApp = () => {
            signInAnonymously(auth).catch(err => console.error("Firebase Auth Hatası:", err));

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    // Kullanıcı ismi yoksa ve admin değilse kayıt ekranı
                    if (!userName && !isAdmin) {
                        loginOverlay.classList.remove('hidden');
                    } else {
                        startSystem();
                    }
                }
            });
        };

        const startSystem = () => {
            loginOverlay.classList.add('hidden');
            setupChatListeners();
            setupConfigListener();
        };

        // Bot Ayarlarını Dinle
        const setupConfigListener = () => {
            onSnapshot(doc(db, 'config', 'botState'), (docSnap) => {
                if (docSnap.exists()) {
                    isBotActive = docSnap.data().active;
                    document.getElementById('botStatusLabel').innerText = isBotActive ? "Çevrimiçi (AI)" : "Manuel Mod";
                    if (isAdmin) document.getElementById('botToggle').checked = isBotActive;
                }
            });
        };

        // Mesajları Dinle
        const setupChatListeners = () => {
            const q = collection(db, 'messages');
            onSnapshot(q, (snapshot) => {
                chatWindow.innerHTML = '';
                const msgs = [];
                snapshot.forEach(d => msgs.push({id: d.id, ...d.data()}));
                msgs.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                msgs.forEach(renderMessage);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            });
        };

        function renderMessage(msg) {
            const div = document.createElement('div');
            const isMe = msg.uid === currentUser?.uid;
            const isBot = msg.sender === 'bot';

            let align = isMe ? "self-end bg-blue-600 rounded-tr-none" : "self-start bg-slate-700 rounded-tl-none";
            if (isBot) align = "self-start bg-slate-800 border border-blue-500/30 rounded-tl-none";

            div.className = `max-w-[80%] p-3 rounded-2xl mb-2 text-sm ${align} text-white shadow-md`;
            
            const name = `<div class="text-[10px] opacity-50 mb-1">${isBot ? "Sezan AI" : (msg.userName || "Anonim")}</div>`;
            div.innerHTML = `${name}<div>${msg.text}</div>`;
            chatWindow.appendChild(div);
        }

        // AI Yanıt Üretici
        async function getAIResponse(text) {
            if(!geminiApiKey) return "AI Yanıtı için API Key girilmedi.";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{parts: [{text}]}] })
                });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch { return "Bağlantı sorunu var."; }
        }

        // Mesaj Gönder
        window.handleSendMessage = async (e) => {
            e.preventDefault();
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val) return;
            input.value = '';

            await addDoc(collection(db, 'messages'), {
                text: val,
                sender: 'user',
                userName: userName || "Misafir",
                uid: currentUser.uid,
                timestamp: serverTimestamp()
            });

            if (isBotActive && !isAdmin) {
                const aiVal = await getAIResponse(val);
                await addDoc(collection(db, 'messages'), {
                    text: aiVal,
                    sender: 'bot',
                    uid: 'bot-id',
                    timestamp: serverTimestamp()
                });
            }
        };

        // Admin Girişi
        window.confirmAdminLogin = () => {
            const pass = document.getElementById('adminPassInput').value;
            if (pass === "berkbabapiro") {
                isAdmin = true;
                userName = "Admin Berk";
                adminPanel.classList.remove('hidden');
                document.getElementById('adminIndicator').classList.remove('hidden');
                document.getElementById('adminLoginModal').classList.add('hidden');
                loginOverlay.classList.add('hidden');
                startSystem();
            } else { alert("Şifre yanlış!"); }
        };

        window.toggleBot = async () => {
            await setDoc(doc(db, 'config', 'botState'), { active: document.getElementById('botToggle').checked });
        };

        window.registerUser = () => {
            const name = document.getElementById('nameInput').value.trim();
            if (name.length < 2) return;
            userName = name;
            localStorage.setItem('sezan_user_name', name);
            startSystem();
        };

        window.onload = initApp;
    </script>
    <style>
        body { background: #020617; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        #chatWindow { height: calc(100vh - 160px); }
    </style>
</head>
<body class="flex flex-col h-screen text-slate-200">

    <!-- Admin Giriş Modal -->
    <div id="adminLoginModal" class="hidden fixed inset-0 z-[200] bg-black/90 flex items-center justify-center p-4">
        <div class="bg-slate-900 p-6 rounded-2xl w-full max-w-xs border border-slate-700">
            <h3 class="mb-4 font-bold">Yönetici Paneli</h3>
            <input type="password" id="adminPassInput" placeholder="Şifre" class="w-full bg-slate-800 p-3 rounded-xl mb-4 outline-none border border-slate-700 focus:border-blue-500">
            <button onclick="confirmAdminLogin()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Giriş</button>
            <button onclick="document.getElementById('adminLoginModal').classList.add('hidden')" class="w-full mt-2 text-xs opacity-50">Kapat</button>
        </div>
    </div>

    <!-- Kayıt Ekranı -->
    <div id="loginOverlay" class="hidden fixed inset-0 z-[100] glass flex items-center justify-center p-4 text-center">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-sm border border-slate-800 shadow-2xl">
            <h2 class="text-2xl font-bold mb-4">Hoş Geldin</h2>
            <input type="text" id="nameInput" placeholder="Adın" class="w-full bg-slate-800 p-3 rounded-xl mb-4 outline-none border border-slate-700">
            <button onclick="registerUser()" class="w-full bg-blue-600 py-3 rounded-xl font-bold mb-4">Başla</button>
            <button onclick="document.getElementById('adminLoginModal').classList.remove('hidden')" class="text-xs opacity-40 underline">Yöneticiyim</button>
        </div>
    </div>

    <!-- Üst Bar -->
    <header class="p-4 border-b border-slate-800 flex justify-between items-center glass shrink-0">
        <div class="flex items-center gap-3">
            <div onclick="document.getElementById('adminLoginModal').classList.remove('hidden')" class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center cursor-pointer">
                <i class="fas fa-bolt"></i>
            </div>
            <div>
                <h1 class="font-bold">SEZAN <span class="text-blue-500">AI</span></h1>
                <p id="botStatusLabel" class="text-[10px] opacity-50 uppercase"></p>
            </div>
        </div>
        <div id="adminIndicator" class="hidden bg-red-500/20 text-red-500 px-3 py-1 rounded-full text-[10px] font-bold">ADMİN</div>
    </header>

    <!-- Mesajlaşma -->
    <main id="chatWindow" class="flex-1 overflow-y-auto p-4 flex flex-col"></main>

    <!-- Admin Panel (Uçan) -->
    <div id="adminPanel" class="hidden fixed top-20 right-4 w-64 bg-slate-900 border border-blue-500/30 p-4 rounded-2xl shadow-2xl">
        <div class="flex justify-between mb-3 border-b border-slate-800 pb-2">
            <span class="text-xs font-bold text-blue-400">Yönetim</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="botToggle" class="sr-only peer" onchange="toggleBot()">
                <div class="w-8 h-4 bg-slate-700 rounded-full peer peer-checked:bg-blue-600"></div>
            </label>
        </div>
        <p class="text-[10px] opacity-50 italic">Admin modunda AI yanıtları kapalıdır.</p>
    </div>

    <!-- Alt Yazma Alanı -->
    <footer class="p-4 glass shrink-0">
        <form onsubmit="handleSendMessage(event)" class="flex gap-2 max-w-3xl mx-auto">
            <input type="text" id="userInput" placeholder="Mesaj yaz..." class="flex-1 bg-slate-800 p-3 rounded-xl outline-none focus:ring-1 focus:ring-blue-500">
            <button type="submit" class="bg-blue-600 w-12 h-12 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane"></i></button>
        </form>
    </footer>

</body>
</html>
