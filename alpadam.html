<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sezan AI - Akıllı Sohbet ve Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const apiKey = ""; // Gemini API Anahtarı - Sistem otomatik dolduracak

        let app, auth, db, appId;
        let currentUser = null;
        let isBotActive = true;
        let isAdmin = false;
        let userName = localStorage.getItem('sezan_user_name') || "";

        // UI Elementleri
        const chatWindow = document.getElementById('chatWindow');
        const botStatusLabel = document.getElementById('botStatusLabel');
        const adminPanel = document.getElementById('adminPanel');
        const userList = document.getElementById('userList');
        const loginOverlay = document.getElementById('loginOverlay');

        // Global Toast Bildirim Fonksiyonu
        window.showToast = (msg, isError = false) => {
            const toastContainer = document.getElementById('toastContainer');
            if (!toastContainer) return;
            const toast = document.createElement('div');
            toast.className = `px-4 py-2 rounded-full shadow-lg text-sm font-bold text-white transition-all transform duration-300 translate-y-[-20px] opacity-0 ${isError ? 'bg-red-500' : 'bg-green-500'}`;
            toast.innerText = msg;
            toastContainer.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-[-20px]', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
            });

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-[-20px]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // Firebase Başlatma ve Güvenlik
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
            appId = typeof __app_id !== 'undefined' ? __app_id : 'sezan-ai-app';
            
            if (Object.keys(firebaseConfig).length > 0) {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            } else {
                showToast("Veritabanı yapılandırması bulunamadı!", true);
            }
        } catch (e) {
            console.error("Firebase başlatma hatası:", e);
        }

        // 1. Auth & Başlatma İşlemi
        const initApp = async () => {
            if (!auth) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                showToast("Sisteme giriş yapılamadı.", true);
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    // Kullanıcı daha önce kayıt olmadıysa ve admin değilse kayıt ekranı göster
                    if (!userName && !isAdmin) {
                        loginOverlay.classList.remove('hidden');
                    } else {
                        startSystem();
                    }
                }
            });
        };

        const startSystem = () => {
            loginOverlay.classList.add('hidden');
            setupConfigListener();
            setupChatListeners();
        };

        // Kayıt Fonksiyonu
        window.registerUser = () => {
            const nameInput = document.getElementById('nameInput').value.trim();
            if (nameInput.length < 2) return showToast("Lütfen geçerli bir isim girin.", true);
            userName = nameInput;
            localStorage.setItem('sezan_user_name', userName);
            startSystem();
        };

        // 2. Bot Durumunu Dinle (Admin paneli aç/kapa yaparsa anında güncellenir)
        const setupConfigListener = () => {
            if (!currentUser || !db) return;
            const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'botState');
            onSnapshot(configDoc, (docSnap) => {
                if (docSnap.exists()) {
                    isBotActive = docSnap.data().active;
                    updateStatusUI();
                } else if (isAdmin) {
                    setDoc(configDoc, { active: true });
                }
            }, (err) => console.error("Config error:", err));
        };

        // 3. Mesajları Dinle (Herkesin yazdığı buraya düşer)
        const setupChatListeners = () => {
            if (!currentUser || !db) return;
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
            
            onSnapshot(q, (snapshot) => {
                chatWindow.innerHTML = '';
                const messages = [];
                snapshot.forEach(doc => messages.push({id: doc.id, ...doc.data()}));
                
                messages.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                
                messages.forEach(msg => renderMessage(msg));
                chatWindow.scrollTop = chatWindow.scrollHeight;

                if (isAdmin) {
                    const uniqueUsers = [...new Set(messages.filter(m => m.sender === 'user').map(m => m.userName || m.uid))];
                    userList.innerHTML = uniqueUsers.map(name => `<li class="text-xs py-1 border-b border-slate-700 font-medium text-slate-300">${name}</li>`).join('');
                }
            }, (err) => {
                console.error("Snapshot error:", err);
            });
        };

        function updateStatusUI() {
            if (isBotActive) {
                botStatusLabel.innerHTML = '<span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Çevrimiçi (AI Aktif)';
                botStatusLabel.className = "text-xs text-green-400 flex items-center gap-1";
            } else {
                botStatusLabel.innerHTML = '<span class="w-2 h-2 bg-yellow-400 rounded-full"></span> Manuel Mod (Operatör Bağlı)';
                botStatusLabel.className = "text-xs text-yellow-400 flex items-center gap-1";
            }
            if (isAdmin) {
                const toggle = document.getElementById('botToggle');
                if (toggle) toggle.checked = isBotActive;
            }
        }

        function renderMessage(msg) {
            const div = document.createElement('div');
            const isMe = msg.uid === currentUser?.uid;
            let senderClasses = "";
            
            if (msg.sender === 'user') {
                senderClasses = isMe ? "bg-blue-600 self-end rounded-tr-none" : "bg-slate-700 self-start rounded-tl-none";
            } else {
                senderClasses = "bg-slate-800 self-start border border-blue-500/30 rounded-tl-none";
            }

            div.className = `max-w-[85%] p-3 rounded-2xl mb-1 ${senderClasses} break-words message-appear`;
            
            // Eğer mesajı yazan başka biriyse adını göster (AI veya diğer kullanıcı)
            const nameTag = (!isMe && msg.sender === 'user') ? `<div class="text-[10px] text-slate-400 mb-1">${msg.userName || 'Anonim'}</div>` : '';
            const botTag = (msg.sender === 'bot') ? `<div class="text-[10px] text-blue-400 font-bold mb-1"><i class="fas fa-robot"></i> ${msg.userName || 'Sezan AI'}</div>` : '';
            
            div.innerHTML = `${nameTag}${botTag}<div>${msg.text}</div>`;
            chatWindow.appendChild(div);
        }

        // --- YAPAY ZEKA CEVAP ÜRETİCİ ---
        async function getAIResponse(userText) {
            const systemPrompt = "Sen 'Sezan AI' adında akıllı ve yardımsever bir yapay zekasın. Kullanıcıların sorularına dostça ve kısa yanıtlar ver. İnsan gibi davran.";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                if (!response.ok) throw new Error('API Hatası');
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Şu an bu konuya cevap veremiyorum.";
            } catch (error) {
                console.error("Gemini Error:", error);
                return "Şu an bağlantımda ufak bir pürüz var, yöneticim birazdan sizinle ilgilenecek.";
            }
        }

        // 4. Mesaj Gönderme
        window.handleSendMessage = async (e) => {
            e.preventDefault();
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            if (!currentUser) return showToast("Bağlantı bekleniyor...", true);

            input.value = '';

            // 1) Kullanıcı mesajını veritabanına yaz
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                text: text,
                sender: 'user',
                userName: userName || "Misafir",
                uid: currentUser.uid,
                timestamp: serverTimestamp()
            });

            // 2) Eğer AI Aktifse, bot otomatik cevap versin
            if (isBotActive && !isAdmin) { // Admin kendi yazdığı mesaja AI cevabı almasın
                const aiCevabi = await getAIResponse(text);
                
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                    text: aiCevabi,
                    sender: 'bot',
                    userName: 'Sezan AI',
                    uid: 'SEZAN_AI_SYSTEM',
                    timestamp: serverTimestamp()
                });
            }
        };

        // --- ADMIN GİRİŞİ VE İŞLEMLERİ ---
        window.tryAdminLogin = () => {
            document.getElementById('adminLoginModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('adminPassInput').focus(), 100);
        };

        window.cancelAdminLogin = () => {
            document.getElementById('adminLoginModal').classList.add('hidden');
            document.getElementById('adminPassInput').value = '';
        };

        window.confirmAdminLogin = () => {
            const pass = document.getElementById('adminPassInput').value;
            if (pass === "berkbabapiro") {
                isAdmin = true;
                userName = "Admin Berk"; 
                
                adminPanel.classList.remove('hidden');
                document.getElementById('adminControls').classList.remove('hidden');
                loginOverlay.classList.add('hidden'); 
                document.getElementById('adminLoginModal').classList.add('hidden');
                document.getElementById('adminIndicator').classList.remove('hidden');
                
                startSystem();
                updateStatusUI();
                showToast("Hoş geldin Berk Baba! Yönetim paneli aktif.");
            } else {
                showToast("Hatalı şifre!", true);
            }
            document.getElementById('adminPassInput').value = '';
        };

        window.toggleBot = async () => {
            if (!isAdmin || !db) return;
            const newStatus = document.getElementById('botToggle').checked;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'botState'), {
                active: newStatus
            });
        };

        window.sendAdminResponse = async () => {
            const input = document.getElementById('adminResponseInput');
            const text = input.value.trim();
            if (!text || !isAdmin || !db) return;

            // Admin panelinden gönderilen mesaj, bot ismiyle gider
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                text: text,
                sender: 'bot',
                userName: 'Sezan AI',
                uid: 'ADMIN_SYSTEM',
                timestamp: serverTimestamp()
            });
            input.value = '';
        };

        window.onload = initApp;
    </script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chat-h { height: calc(100vh - 140px); }
        .message-appear { animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans overflow-hidden flex flex-col h-screen">

    <!-- Toast Container (Hata ve Başarı Bildirimleri) -->
    <div id="toastContainer" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[200] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Yönetici Giriş Modalı -->
    <div id="adminLoginModal" class="hidden fixed inset-0 z-[110] bg-black/80 flex items-center justify-center p-6 backdrop-blur-sm transition-all">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="text-white font-bold mb-4 flex items-center gap-2"><i class="fas fa-lock text-blue-500"></i> Yönetici Girişi</h3>
            <input type="password" id="adminPassInput" placeholder="Şifre: berkbabapiro" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 mb-4 text-white focus:outline-none focus:border-blue-500 transition-colors">
            <div class="flex gap-3">
                <button onclick="cancelAdminLogin()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white py-2.5 rounded-xl transition-colors font-semibold">İptal</button>
                <button onclick="confirmAdminLogin()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-xl transition-colors font-semibold shadow-lg shadow-blue-600/20">Giriş Yap</button>
            </div>
        </div>
    </div>

    <!-- Giriş/Kayıt Ekranı (İlk Açılış) -->
    <div id="loginOverlay" class="hidden fixed inset-0 z-[100] glass flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md shadow-2xl text-center">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/20">
                <i class="fas fa-robot text-2xl text-white"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-white">Sezan AI'a Hoş Geldiniz</h2>
            <p class="text-slate-400 text-sm mb-6">Lütfen sohbete başlamak için bir takma ad girin.</p>
            <input type="text" id="nameInput" placeholder="Adınız veya Takma Adınız" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-blue-500 text-white transition-colors">
            <button onclick="registerUser()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all text-white mb-4 shadow-lg shadow-blue-600/20 active:scale-95">Sohbete Başla</button>
            <button onclick="tryAdminLogin()" class="text-[12px] text-slate-500 hover:text-white transition-colors underline decoration-slate-700 underline-offset-4 cursor-pointer">Yetkili Girişi Yap</button>
        </div>
    </div>

    <!-- Header / Üst Bilgi -->
    <header class="p-4 border-b border-slate-800/50 flex justify-between items-center glass sticky top-0 z-50 shrink-0">
        <div class="flex items-center gap-3">
            <!-- LOGO: Admin Girişi Tetikleyici -->
            <div onclick="tryAdminLogin()" class="w-11 h-11 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center cursor-pointer active:scale-95 hover:shadow-lg hover:shadow-blue-500/20 transition-all">
                <i class="fas fa-bolt text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-black text-xl tracking-tighter italic text-white">SEZAN<span class="text-blue-500">AI</span></h1>
                <p id="botStatusLabel" class="text-[10px] uppercase font-bold text-slate-400">Bağlanıyor...</p>
            </div>
        </div>
        <div id="adminIndicator" class="hidden text-[10px] bg-red-500/10 text-red-400 px-3 py-1.5 rounded-full border border-red-500/20 font-bold flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span> ADMİN MODU
        </div>
    </header>

    <!-- Chat Window / Mesajlaşma Alanı -->
    <main id="chatWindow" class="flex-1 overflow-y-auto p-4 flex flex-col scroll-smooth pb-24"></main>

    <!-- Admin Panel (Sağ Üst Köşede) -->
    <div id="adminPanel" class="hidden fixed top-24 right-4 w-80 glass bg-slate-900/95 border border-blue-500/30 rounded-2xl p-5 shadow-2xl z-50">
        <div class="flex justify-between items-center mb-5">
            <h3 class="text-blue-400 font-bold flex items-center gap-2 text-sm uppercase tracking-wider">
                <i class="fas fa-shield-halved"></i> Yönetim Paneli
            </h3>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="text-slate-500 hover:text-white bg-slate-800 w-8 h-8 rounded-full flex items-center justify-center transition-colors"><i class="fas fa-times"></i></button>
        </div>
        <div class="space-y-4">
            <div class="flex justify-between items-center p-3 bg-slate-800/50 rounded-xl border border-slate-700/50">
                <span class="text-xs font-semibold text-slate-200">Yapay Zeka (AI) Yanıtlasın</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="botToggle" class="sr-only peer" onchange="toggleBot()">
                    <div class="w-10 h-5 bg-slate-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-blue-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
                </label>
            </div>
            <div>
                <span class="text-[10px] text-slate-400 uppercase font-bold px-1 tracking-wider">Odada Olan Kişiler</span>
                <ul id="userList" class="mt-2 max-h-32 overflow-y-auto bg-slate-800/30 border border-slate-700/50 rounded-xl p-2 space-y-1"></ul>
            </div>
            <div id="adminControls" class="hidden border-t border-slate-700/50 pt-4 space-y-3">
                <textarea id="adminResponseInput" placeholder="Yapay zeka adına manuel cevap yaz..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-blue-500 h-20 text-slate-200 resize-none"></textarea>
                <button onclick="sendAdminResponse()" class="w-full bg-blue-600 py-3 rounded-xl text-xs font-bold hover:bg-blue-500 text-white transition-colors tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20 active:scale-95">
                    <i class="fas fa-paper-plane"></i> BOT ADIYLA GÖNDER
                </button>
            </div>
        </div>
    </div>

    <!-- Input Area / Alt Mesaj Gönderme Çubuğu -->
    <div class="fixed bottom-0 w-full p-4 glass shrink-0 bg-slate-950/80">
        <form id="chatForm" class="flex gap-3 max-w-4xl mx-auto items-center" onsubmit="handleSendMessage(event)">
            <input type="text" id="userInput" placeholder="Mesajınızı buraya yazın..." 
                class="flex-1 bg-slate-900 border border-slate-700 rounded-2xl px-5 py-3.5 focus:outline-none focus:border-blue-500 transition-all text-white text-sm shadow-inner">
            <button type="submit" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center hover:bg-blue-500 shadow-lg shadow-blue-600/20 active:scale-95 transition-all">
                <i class="fas fa-paper-plane text-lg"></i>
            </button>
        </form>
    </div>

</body>
</html>
